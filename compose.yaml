services:
  server:
    image: ghcr.io/alicipy/lenzr-server:latest
    container_name: lenzr_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - internal
    volumes:
      - lenzr_data:/var/lib/lenzr
    security_opt:
      - no-new-privileges:true
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - UPLOAD_STORAGE_PATH=${UPLOAD_STORAGE_PATH}
      - LENZR_USERNAME=${LENZR_USERNAME}
      - LENZR_PASSWORD=${LENZR_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18.0-alpine3.22
    container_name: lenzr_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  alembic_migrate:
    image: ghcr.io/alicipy/lenzr-server:latest
    container_name: alembic_migrate
    # Invoke alembic directly: 'uv run' triggers a project re-resolve that
    # requires .git (uv-dynamic-versioning), which isn't shipped in the image.
    command: alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy

networks:
  internal:

volumes:
  postgres_data:
  lenzr_data:
    driver: local
    driver_opts:
      type: none
      device: ./lenzr_data
      o: bind
